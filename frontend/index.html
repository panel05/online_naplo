<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Online napló</title>
</head>
<body>
  <main class="container">
    <h1>Online napló</h1>
    <p class="subtitle">Privát jegyzetek egyszerűen</p>

    <section class="card">
      <h2>Belépés</h2>

      <input type="text" id="username" placeholder="Felhasználónév">
      <input type="password" id="password" placeholder="Jelszó">

      <button type="button" onclick="login()">Belépés</button>

      <p id="auth.message"></p>
      <p class="switch-text">
        Még nincs fiókod?
        <a href="register.html">Regisztráció</a>
      </p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
